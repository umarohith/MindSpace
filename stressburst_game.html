<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Kinetic Pop</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; text-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body>
    <div id="ui"><h1>SCORE: <span id="score">0</span></h1></div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let audioCtx = null;
let score = 0;
let orbs = [];
let particles = [];
let ripples = [];

// --- ENHANCED AUDIO ---
function playPopSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    // Harmonic Duo (Root + Perfect Fifth) for a "magical" sound
    const freqs = [440, 554, 659, 880]; // A Major set
    const base = freqs[Math.floor(Math.random() * freqs.length)];
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(base, now);
    osc.frequency.exponentialRampToValueAtTime(base * 2, now + 0.1);

    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(base * 1.5, now); // The "Fifth"
    
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);

    osc.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(); osc2.start();
    osc.stop(now + 0.4); osc2.stop(now + 0.4);
}

// --- ATTRACTIVE ANIMATIONS ---
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.color = color;
        this.size = Math.random() * 3 + 2;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.alpha = 1;
        this.gravity = 0.15;
    }
    update() {
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.02;
    }
}

class Ripple {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.color = color;
        this.r = 10;
        this.alpha = 1;
    }
    update() { this.r += 4; this.alpha -= 0.03; }
}

class Orb {
    constructor() {
        this.r = Math.random() * 15 + 20;
        this.x = Math.random() * (canvas.width - 60) + 30;
        this.y = canvas.height + 50;
        this.speed = Math.random() * 2 + 1;
        this.hue = Math.random() * 360;
    }
    draw() {
        ctx.save();
        ctx.shadowBlur = 20;
        ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
        ctx.fill();
        ctx.restore();
    }
}

function handleInput(e) {
    const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
    const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);

    orbs.forEach((orb, i) => {
        if (Math.hypot(orb.x - x, orb.y - y) < orb.r + 10) {
            playPopSound();
            ripples.push(new Ripple(orb.x, orb.y, `hsl(${orb.hue}, 100%, 50%)`));
            for(let j=0; j<15; j++) particles.push(new Particle(orb.x, orb.y, `hsl(${orb.hue}, 100%, 50%)`));
            orbs.splice(i, 1);
            score++;
            document.getElementById('score').innerText = score;
        }
    });
}

window.addEventListener('mousedown', handleInput);
window.addEventListener('touchstart', handleInput);

function animate() {
    // Subtle trail effect
    ctx.fillStyle = 'rgba(2, 2, 5, 0.25)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (Math.random() < 0.04) orbs.push(new Orb());

    // Draw Ripples (The "Shockwave")
    ripples.forEach((rip, i) => {
        rip.update();
        ctx.beginPath();
        ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI*2);
        ctx.strokeStyle = rip.color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = rip.alpha;
        ctx.stroke();
        if(rip.alpha <= 0) ripples.splice(i, 1);
    });

    // Draw Particles
    ctx.globalAlpha = 1;
    particles.forEach((p, i) => {
        p.update();
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.fillRect(p.x, p.y, p.size, p.size);
        if(p.alpha <= 0) particles.splice(i, 1);
    });

    // Draw Orbs
    ctx.globalAlpha = 1;
    orbs.forEach((o, i) => {
        o.y -= o.speed;
        o.draw();
        if (o.y < -50) orbs.splice(i, 1);
    });

    requestAnimationFrame(animate);
}

animate();
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
