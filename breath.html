<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Space | Radiant Pink</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --baby-pink: #FCE4EC;
            --rose-pink: #F8BBD0;
            --deep-rose: #F06292;
            --soft-cream: #FFFBF0;
            --text-pink: #880E4F;
            --glow-shadow: rgba(240, 98, 146, 0.4);
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--soft-cream);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-pink);
        }

        /* --- 1. THE RADIANT BACKGROUND --- */
        .bg-glow {
            position: fixed;
            z-index: -1;
            width: 100%; height: 100%;
            filter: blur(80px);
            opacity: 0.6;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            animation: drift 15s infinite alternate ease-in-out;
        }
        .b1 { width: 500px; height: 500px; background: var(--baby-pink); top: -10%; left: -10%; }
        .b2 { width: 400px; height: 400px; background: var(--rose-pink); bottom: -10%; right: -10%; }

        @keyframes drift {
            from { transform: scale(1); }
            to { transform: scale(1.2) translate(30px, 30px); }
        }

        /* --- 2. THE PULSING LOTUS --- */
        .lotus-wrapper {
            position: relative;
            width: 350px; height: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Audio Aura: Only visible when playing */
        .audio-pulse {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: var(--rose-pink);
            filter: blur(40px);
            opacity: 0;
            transition: 0.5s;
        }

        .playing .audio-pulse {
            animation: pulse-aura 4s infinite ease-in-out;
        }

        @keyframes pulse-aura {
            0%, 100% { transform: scale(0.8); opacity: 0.2; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        .petal {
            position: absolute;
            width: 50px; height: 130px;
            background: linear-gradient(to bottom, var(--rose-pink), white);
            border-radius: 50% 50% 50% 50% / 85% 85% 15% 15%;
            transform-origin: bottom center;
            transition: all 4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(240, 98, 146, 0.2);
            z-index: 2;
        }

        /* 12 Petals */
        .p1 { transform: rotate(0deg); }   .p2 { transform: rotate(30deg); }
        .p3 { transform: rotate(60deg); }  .p4 { transform: rotate(90deg); }
        .p5 { transform: rotate(120deg); } .p6 { transform: rotate(150deg); }
        .p7 { transform: rotate(180deg); } .p8 { transform: rotate(210deg); }
        .p9 { transform: rotate(240deg); } .p10 { transform: rotate(270deg); }
        .p11 { transform: rotate(300deg); } .p12 { transform: rotate(330deg); }

        .inhale .petal {
            height: 190px; width: 75px;
            background: linear-gradient(to bottom, var(--deep-rose), var(--baby-pink));
            box-shadow: 0 0 30px var(--glow-shadow);
        }

        .exhale .petal {
            height: 90px; width: 40px;
            opacity: 0.6;
        }

        .status-label {
            position: absolute;
            z-index: 10;
            font-size: 1.5rem;
            letter-spacing: 5px;
            font-weight: 600;
            text-transform: uppercase;
            transition: 4s ease-in-out;
        }

        /* --- 3. AUDIO VISIBILITY & UI --- */
        .ui-panel {
            margin-top: 80px;
            text-align: center;
            z-index: 20;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
            opacity: 0.8;
        }

        input[type="range"] {
            accent-color: var(--deep-rose);
            cursor: pointer;
            width: 120px;
        }

        .btn-main {
            background: var(--deep-rose);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 50px;
            font-family: 'Quicksand';
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px var(--glow-shadow);
            transition: 0.3s;
        }

        .btn-main:hover {
            transform: scale(1.05);
            background: #E91E63;
        }

        .visualizer-text {
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 10px;
            color: var(--deep-rose);
            display: none;
        }

        .playing .visualizer-text { display: block; }

    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
    </div>

    <div class="lotus-wrapper" id="container">
        <div class="audio-pulse"></div>
        <div class="petal p1"></div><div class="petal p2"></div>
        <div class="petal p3"></div><div class="petal p4"></div>
        <div class="petal p5"></div><div class="petal p6"></div>
        <div class="petal p7"></div><div class="petal p8"></div>
        <div class="petal p9"></div><div class="petal p10"></div>
        <div class="petal p11"></div><div class="petal p12"></div>
        
        <div class="status-label" id="status">Breathe</div>
    </div>

    <div class="ui-panel">
        <div class="audio-controls">
            <span>Vol</span>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
        </div>
        <button class="btn-main" id="startBtn">Begin Session</button>
        <div class="visualizer-text">Audio Active • The Mountain Relax</div>
    </div>

    <audio id="music" loop>
        <source src="the_mountain-relax-relax-music-508021.mp3" type="audio/mpeg">
    </audio>

    <script>
        const container = document.getElementById('container');
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const music = document.getElementById('music');
        const volume = document.getElementById('volume');

        let isRunning = false;
        let breathInterval;

        function breathFlow() {
            if (container.classList.contains('inhale')) {
                container.classList.remove('inhale');
                container.classList.add('exhale');
                status.innerText = "Exhale";
            } else {
                container.classList.remove('exhale');
                container.classList.add('inhale');
                status.innerText = "Inhale";
            }
        }

        startBtn.addEventListener('click', () => {
            if (!isRunning) {
                music.play();
                container.classList.add('playing', 'inhale');
                status.innerText = "Inhale";
                breathInterval = setInterval(breathFlow, 4000);
                startBtn.innerText = "Stop Session";
                isRunning = true;
            } else {
                music.pause();
                clearInterval(breathInterval);
                container.classList.remove('playing', 'inhale', 'exhale');
                status.innerText = "Breathe";
                startBtn.innerText = "Begin Session";
                isRunning = false;
            }
        });

        volume.addEventListener('input', (e) => {
            music.volume = e.target.value;
        });
    </script>
</body>
</html>
